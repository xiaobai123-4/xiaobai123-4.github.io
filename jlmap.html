<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Kiss</title>
    <style type="text/css">
        body,
        html {
            width: 100%;
            height: 100%;
            margin: 0;
            font-family: "微软雅黑";
        }

        ul li {
            list-style: none;
        }

        @keyframes kisloading {
            0% {
                width: 60px;
                height: 60px;
                left: calc(50% - 30px);
                top: calc(50% - 30px);
            }

            25% {
                width: 120px;
                height: 120px;
                left: calc(50% - 60px);
                top: calc(50% - 60px);
            }

            50% {
                width: 60px;
                height: 60px;
                left: calc(50% - 30px);
                top: calc(50% - 30px);
            }

            75% {
                width: 120px;
                height: 120px;
                left: calc(50% - 60px);
                top: calc(50% - 60px);
            }

            100% {
                width: 60px;
                height: 60px;
                left: calc(50% - 30px);
                top: calc(50% - 30px);
            }
        }

        #map_canvas {
            width: 100%;
            height: 100%;
        }

        #kiss {
            position: fixed;
            display: none;
            z-index: 999;
            width: 120px;
            height: 120px;
            left: calc(50% - 60px);
            top: calc(50% - 60px);
            animation-name: kisloading;
            animation-duration: 2s;
            animation-timing-function: ease;
            animation-iteration-count: infinite
        }

        #result {
            width: 150px;
            padding: 20px;
            z-index: 999;
            box-sizing: border-box;
            position: fixed;
            top: 3.5rem;
            margin-left: calc(50% - 75px);
            border-radius: .25rem;
            display: flex;
            box-shadow: 0 2px 6px 0 rgba(27, 142, 236, 0.5);
            text-align: center;
        }

        #btns {
            z-index: 999;
            position: fixed;
            bottom: 3.5rem;
            margin-left: 2.5rem;
            padding-left: 0;
            border-radius: .25rem;
            display: flex;
            box-shadow: 0 2px 6px 0 rgba(27, 142, 236, 0.5);
            text-align: center;
        }

        #btns li {
            border-right: 1px solid #d2d2d2;
            padding: 10px 10px;
            height: 100%;
            background-color: #fff;
            cursor: pointer;
            color: #3a79b5;
        }
    </style>

        $("run").onclick = function () {
            //开始
            map.setZoom(12);
            lushu.stop();
            lushu.start();
        }
        $("stop").onclick = function () {
            //停止
            lushu.stop();
        }
        $("pause").onclick = function () {
            //暂停
            lushu.pause();
        }
        $("hide").onclick = function () {
            //隐藏信息窗口
            lushu.hideInfoWindow();
        }
        $("show").onclick = function () {
            //展示信息窗口
            lushu.showInfoWindow();
        }
        function $(element) {
            return document.getElementById(element);
        }
        map.addEventListener("rightclick", function (e) {
            console.warn('点击位置经纬度：' + e.latlng.lng + ',' + e.latlng.lat);
            console.log(lushu, "lushu")
        });

    <script>
        function showKiss() {
            document.getElementById('kiss').style.display = 'block'
            setTimeout(() => {
                document.getElementById('kiss').style.display = 'none'
                lushu.start();
            }, 5000)
        }

        setInterval(() => {
            if (lushu.path.length - 1 == lushu.i) {
                lushu.stop();
                showKiss()
            }
        }, 1000);
    </script>
